<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🌸 8/3 - Gửi Các Bạn Nữ 🌸</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Patrick+Hand&family=Indie+Flower&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fbc7d1 0%, #ffb3c6 50%, #ff9eb5 100%);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            color: #4a2b36;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #ffdde1, #fbc7d1);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading-content {
            text-align: center;
        }

        .loading-emoji {
            font-size: 70px;
            animation: bounce 1.2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .loading-bar {
            width: 220px;
            height: 6px;
            background: #ffe2e8;
            border-radius: 10px;
            margin: 20px auto 0;
            overflow: hidden;
        }

        .loading-progress {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff7b9c, #ff4d6d);
            animation: slideLoading 1.8s infinite;
        }

        @keyframes slideLoading {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(0); }
            100% { transform: translateX(100%); }
        }

        /* Welcome Screen */
        .welcome-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(145deg, #ffb6c1, #ff9eb5, #ff85a2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 900;
            padding: 20px;
        }

        .welcome-content {
            text-align: center;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(6px);
            padding: 40px 30px;
            border-radius: 70px 20px 70px 20px;
            box-shadow: 0 20px 30px rgba(212, 63, 115, 0.2);
        }

        .welcome-title {
            font-family: 'Patrick Hand', cursive;
            font-size: clamp(2.8rem, 12vw, 4.5rem);
            color: white;
            text-shadow: 4px 4px 0 #d43f73;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .welcome-subtitle {
            font-size: 1.3rem;
            color: #fff0f3;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .start-button {
            padding: 18px 45px;
            font-size: 1.5rem;
            background: white;
            border: none;
            color: #d43f73;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 10px 0 #b34180;
            transition: 0.1s ease;
            border: 2px solid #ffc0cb;
            font-family: 'Patrick Hand', cursive;
        }

        .start-button:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #b34180;
        }

        /* Main Container */
        .main-container {
            display: none;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .stage {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            left: 0;
            top: 0;
        }

        /* Envelope kiểu hộp quà lớp học */
        .envelope-container {
            position: relative;
            width: min(320px, 75vw);
            height: min(240px, 55vw);
            transform-style: preserve-3d;
            cursor: pointer;
            margin: auto;
            filter: drop-shadow(0 15px 15px rgba(181, 30, 70, 0.3));
        }

        .envelope {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ffe7eb;
            border-radius: 30px 10px 30px 10px;
            box-shadow: 0 15px 0 #d45d79;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 3px solid white;
        }

        .envelope.open {
            transform: rotateX(12deg) translateZ(20px) scale(0.98);
        }

        .envelope-front {
            position: absolute;
            inset: 0;
            border-radius: 30px 10px 30px 10px;
            background: linear-gradient(145deg, #ffe4e9, #ffd5dd);
            overflow: hidden;
        }

        .sticker {
            position: absolute;
            font-size: 50px;
            top: 15px;
            right: 20px;
            transform: rotate(15deg);
            filter: drop-shadow(2px 4px 4px #ff7b9c);
        }

        .envelope-flap {
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, #ff9eb5, #ff7b9c);
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            clip-path: polygon(0 0, 50% 40%, 100% 0);
            z-index: 2;
            border-radius: 30px 10px 0 0;
        }

        .envelope.open .envelope-flap {
            transform: rotateX(180deg);
        }

        .envelope-pocket {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70%;
            background: linear-gradient(145deg, #ffb3c6, #ff9eb5);
            clip-path: polygon(0 0, 50% 20%, 100% 0, 100% 100%, 0 100%);
            border-radius: 0 0 30px 10px;
        }

        .letter {
            position: absolute;
            width: 92%;
            height: 88%;
            left: 4%;
            top: 6%;
            background: #fffdf7;
            border-radius: 25px 5px 25px 5px;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 15px;
            box-shadow: 0 8px 0 #ffb0c3;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 2px dashed #ff9eb5;
        }

        .envelope.open .letter {
            transform: translateY(-120%) rotateX(0deg);
        }

        .letter-content {
            opacity: 0;
            transition: opacity 0.4s 0.2s;
            text-align: center;
        }

        .envelope.open .letter-content {
            opacity: 1;
        }

        .letter-title {
            font-family: 'Indie Flower', cursive;
            font-size: 2rem;
            color: #d43f73;
        }

        .letter-preview {
            font-size: 1rem;
            background: #ffeef2;
            padding: 8px 15px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 8px;
        }

        /* Modal */
        .letter-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1100;
            opacity: 0;
            backdrop-filter: blur(4px);
            padding: 15px;
        }

        .modal-content {
            width: 100%;
            max-width: 1000px;
            max-height: 90vh;
            background: #fff9fc;
            border-radius: 60px 20px 60px 20px;
            padding: 25px 25px 30px;
            position: relative;
            transform: scale(0.8) translateY(30px);
            opacity: 0;
            overflow-y: auto;
            box-shadow: 0 30px 30px rgba(212, 63, 115, 0.2);
            border: 3px solid white;
        }

        .modal-close {
            position: sticky;
            top: 10px;
            left: 100%;
            transform: translateX(-45px);
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 45px;
            background: #ff7b9c;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 0 #b34180;
            transition: 0.1s;
            z-index: 10;
        }

        .modal-close:active {
            transform: translateX(-45px) translateY(4px);
            box-shadow: 0 1px 0 #b34180;
        }

        .modal-letter-content {
            position: relative;
            padding: 5px 5px 15px;
        }

        .letter-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .modal-letter-title {
            font-family: 'Patrick Hand', cursive;
            font-size: clamp(2.2rem, 7vw, 3.5rem);
            color: #d43f73;
            text-shadow: 3px 3px 0 #ffd9e2;
            background: white;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 0 #ffb3c6;
        }

        .class-name {
            font-size: 1.2rem;
            background: #ffe2e8;
            padding: 6px 20px;
            border-radius: 40px;
            display: inline-block;
            margin: 10px 0 0;
            font-weight: 600;
        }

        /* Layout 2 cột: ảnh và nội dung */
        .modal-layout {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        /* Cột ảnh bên trái */
        .image-column {
            flex: 0 0 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .photo-frame {
            width: 160px;
            height: 160px;
            border-radius: 35px 10px 35px 10px;
            border: 4px solid white;
            box-shadow: 0 8px 0 #ff9eb5;
            overflow: hidden;
            background: #ffe2e8;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-caption {
            font-family: 'Patrick Hand', cursive;
            font-size: 1.2rem;
            color: #d43f73;
            background: white;
            padding: 6px 18px;
            border-radius: 40px;
            box-shadow: 0 4px 0 #ffb3c6;
        }

        /* Cột nội dung bên phải */
        .content-column {
            flex: 1;
            min-width: 260px;
        }

        .typed-container {
            background: #fff0f3;
            padding: 15px 18px;
            border-radius: 35px;
            font-size: 1rem;
            line-height: 1.5;
            color: #a13565;
            margin-bottom: 15px;
            border: 2px dashed #ff9eb5;
            font-family: 'Quicksand', sans-serif;
            min-height: 100px;
        }

        .wishes-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 5px;
            background: rgba(255, 240, 243, 0.5);
            border-radius: 30px;
            max-height: 350px;
            overflow-y: auto;
            min-height: 200px;
            /* Đảm bảo hiển thị */
            visibility: visible !important;
            opacity: 1 !important;
        }

        .wish-item {
            background: white;
            padding: 12px 15px;
            border-radius: 40px;
            display: flex !important; /* Force hiển thị */
            align-items: center;
            gap: 12px;
            transition: all 0.15s;
            box-shadow: 0 4px 0 #ffb3c6;
            border: 2px solid #ffd5dd;
            margin: 0 3px;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .wish-item:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #ff9eb5;
        }

        .wish-icon {
            font-size: 1.7rem;
            min-width: 40px;
            text-align: center;
        }

        .wish-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: #832b54;
            line-height: 1.3;
        }

        .modal-footer {
            text-align: center;
            margin-top: 20px;
            background: #ffecf0;
            padding: 15px;
            border-radius: 40px;
        }

        .modal-signature {
            font-family: 'Patrick Hand', cursive;
            font-size: 1.8rem;
            color: #ff4d6d;
            margin-top: 5px;
        }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 20px;
            right: 15px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .control-button {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 48px;
            background: white;
            box-shadow: 0 6px 0 #ff9eb5;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.08s;
            border: 2px solid white;
        }

        .control-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #ff7b9c;
        }

        .music-controls {
            position: fixed;
            bottom: 85px;
            right: 15px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .music-control-button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 44px;
            background: white;
            box-shadow: 0 5px 0 #ff9eb5;
            cursor: pointer;
            font-size: 1.3rem;
            transition: 0.08s;
            border: 2px solid white;
        }

        .music-control-button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #ff7b9c;
        }

        .volume-container {
            background: white;
            border-radius: 50px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 0 #ffb3c6;
            opacity: 0;
            transform: translateY(-8px);
            transition: 0.2s;
            pointer-events: none;
            border: 2px solid white;
        }

        .volume-container.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .volume-slider {
            width: 110px;
            height: 5px;
            -webkit-appearance: none;
            background: #ffb3c6;
            border-radius: 10px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 18px;
            background: #ff4d6d;
            cursor: pointer;
            border: 2px solid white;
        }

        /* hiệu ứng vui nhộn */
        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #ffb3c6;
            pointer-events: none;
            z-index: 999;
            animation: confettiFall 4s linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0.4; }
        }

        .floating-emoji {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            z-index: 5;
            animation: floatUp 5s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.8); opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* iphone */
        @media (max-width: 700px) {
            .modal-layout {
                flex-direction: column;
                align-items: center;
            }
            
            .image-column {
                flex: 0 0 auto;
                margin-bottom: 5px;
            }
            
            .modal-content {
                padding: 20px 15px;
            }
            
            .wishes-container {
                max-height: 280px;
            }
        }
    </style>
</head>
<body>

    <!-- Loading -->
    <div class="loading-screen">
        <div class="loading-content">
            <div class="loading-emoji">🎀👧🎀</div>
            <div style="font-size: 1.3rem; font-weight: 700; color: #d43f73;">Đang chuẩn bị bất ngờ...</div>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- Welcome -->
    <div class="welcome-screen">
        <div class="welcome-content">
            <h1 class="welcome-title">GỬI CÁC BẠN NỮ CỰC PHẨM</h1>
            <p class="welcome-subtitle">Nhấn vào quà để nhận lời chúc 8/3 từ cả lớp nha!</p>
            <button class="start-button">Mở quà ngay 🌸</button>
        </div>
    </div>

    <!-- Main -->
    <div class="main-container">
        <div class="stage">
            <div class="envelope-container">
                <div class="envelope">
                    <div class="envelope-front">
                        <div class="sticker">🌸🎀</div>
                        <div class="envelope-flap"></div>
                        <div class="envelope-pocket"></div>
                    </div>
                    <div class="letter">
                        <div class="letter-content">
                            <h2 class="letter-title">Lớp mình 8/3</h2>
                            <div class="letter-preview">Chạm vô đọc tiếp nè 👇</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal letter -->
        <div class="letter-modal">
            <div class="modal-content">
                <button class="modal-close">×</button>
                <div class="modal-letter-content">
                    <div class="letter-header">
                        <h2 class="modal-letter-title">8/3 vui vẻ nhé!</h2>
                        <div class="class-name">🎓 Lớp 9A3 🎓</div>
                    </div>

                    <!-- Layout 2 cột: ảnh bên trái, nội dung bên phải -->
                    <div class="modal-layout">
                        <!-- Cột ảnh bên trái -->
                        <div class="image-column">
                            <div class="photo-frame">
                                <img src="anh.png" alt="Ảnh kỷ niệm" 
                                     onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22160%22 height=%22160%22 viewBox=%220 0 160 160%22><rect width=%22160%22 height=%22160%22 fill=%22%23ffb3c6%22/><text x=%2280%22 y=%2285%22 font-size=%2218%22 text-anchor=%22middle%22 fill=%22%23d43f73%22 font-family=%22Arial%22>🌸 KHÔNG CÓ ẢNH 🌸</text></svg>';">
                            </div>
                            <div class="photo-caption">💝 Các bạn nữ 💝</div>
                        </div>

                        <!-- Cột nội dung bên phải -->
                        <div class="content-column">
                            <div class="typed-container"></div>
                            
                            <!-- Container lời chúc - đã fix lỗi hiển thị -->
                            <div class="wishes-container" id="wishesContainer"></div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <p>Chúc các bạn nữ luôn vui tươi, học giỏi và xinh đẹp!</p>
                        <div class="modal-signature">Hội con trai lớp 💙</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- control buttons -->
        <div class="controls">
            <button class="control-button" id="musicToggle">🎵</button>
            <button class="control-button" id="themeToggle">🌙</button>
        </div>

        <div class="music-controls">
            <button class="music-control-button" id="volumeButton">🔊</button>
            <div class="volume-container" id="volumeContainer">
                <span>🔊</span>
                <input type="range" min="0" max="100" value="60" class="volume-slider" id="volumeSlider">
            </div>
        </div>
    </div>

    <!-- audio từ file cùng thư mục: music.mp3 -->
    <audio id="bgMusic" loop preload="auto" src="music.mp3"></audio>
    <audio id="openSound" preload="auto" src="music.mp3"></audio>
    <audio id="modalSound" preload="auto" src="music.mp3"></audio>

    <script>
        (function() {
            // DOM elements
            const loading = document.querySelector('.loading-screen');
            const welcome = document.querySelector('.welcome-screen');
            const main = document.querySelector('.main-container');
            const startBtn = document.querySelector('.start-button');
            const envelopeContainer = document.querySelector('.envelope-container');
            const envelope = document.querySelector('.envelope');
            const modal = document.querySelector('.letter-modal');
            const modalContent = document.querySelector('.modal-content');
            const closeBtn = document.querySelector('.modal-close');
            
            // Audio
            const bgMusic = document.getElementById('bgMusic');
            const openSound = document.getElementById('openSound');
            const modalSound = document.getElementById('modalSound');
            
            // Buttons
            const musicToggle = document.getElementById('musicToggle');
            const themeToggle = document.getElementById('themeToggle');
            const volumeButton = document.getElementById('volumeButton');
            const volumeContainer = document.getElementById('volumeContainer');
            const volumeSlider = document.getElementById('volumeSlider');

            // state
            let isEnvelopeOpen = false;
            let isMusicPlaying = false;
            let isVolumeVisible = false;
            let isDarkTheme = false;

            // 5 lời chúc siêu vui cho các bạn nữ - ĐẢM BẢO 5 CÁI
            const wishes = [
                { icon: "📚", text: "Học giỏi như tiên, điểm 10 như mưa, thi gì đỗ đó" },
                { icon: "💃", text: "Xinh đẹp lên từng ngày, tự tin toả sáng mọi lúc" },
                { icon: "🍕", text: "Ăn bao nhiêu cũng không lo béo, ăn là gặp may" },
                { icon: "💖", text: "Có thật nhiều người thương, crush cũng thích mình" },
                { icon: "💰", text: "Sớm giàu, sớm có xe đạp điện, đi chơi thả ga" }
            ];

            // loading
            setTimeout(() => {
                gsap.to(loading, { opacity: 0, duration: 0.5, onComplete: () => loading.style.display = 'none' });
            }, 1600);

            // Start
            startBtn.addEventListener('click', () => {
                gsap.to(welcome, { opacity: 0, duration: 0.8, onComplete: () => {
                    welcome.style.display = 'none';
                    main.style.display = 'block';
                    startMain();
                }});
            });

            function startMain() {
                gsap.from('.envelope-container', { scale: 0, rotation: 360, duration: 1, ease: "backOut(1.5)" });
                gsap.to('.envelope-container', { y: '+=10', duration: 1.5, yoyo: true, repeat: -1 });

                startEffects();

                // âm lượng
                bgMusic.volume = volumeSlider.value / 100;
                openSound.volume = volumeSlider.value / 100;
                modalSound.volume = volumeSlider.value / 100;

                // thử phát nhạc
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                    updateMusicButton();
                }).catch(() => {});
            }

            // Mở phong bì
            envelopeContainer.addEventListener('click', () => {
                if (!isEnvelopeOpen) {
                    isEnvelopeOpen = true;
                    envelope.classList.add('open');

                    playSound(openSound);

                    gsap.to('.envelope-container', { scale: 1, y: 0 });
                    setTimeout(() => {
                        openModal();
                    }, 550);
                } else {
                    openModal();
                }
            });

            function openModal() {
                modal.style.display = 'flex';
                gsap.to(modal, { opacity: 1, duration: 0.2 });
                gsap.to(modalContent, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "backOut" });

                playSound(modalSound);

                // Typed
                const typed = new Typed('.typed-container', {
                    strings: [`Gửi các bạn nữ iu quý của lớp!<br>Ngày 8/3 đến rồi, tụi con trai tụi mình có đôi lời:<br>Cảm ơn các bạn đã làm lớp học thêm màu sắc, thêm vui vẻ. Chúc các bạn luôn xinh đẹp, học giỏi, và đặc biệt là luôn hạnh phúc!`],
                    typeSpeed: 35,
                    cursorChar: '🌸',
                    onComplete: () => showWishes()
                });
            }

            function showWishes() {
                const container = document.getElementById('wishesContainer');
                if (!container) {
                    console.error('Không tìm thấy container wishesContainer');
                    return;
                }
                
                // Xóa hết nội dung cũ
                container.innerHTML = '';
                
                // Duyệt mảng và tạo phần tử - HIỂN THỊ ĐỦ 5 LỜI CHÚC
                for (let i = 0; i < wishes.length; i++) {
                    const w = wishes[i];
                    const div = document.createElement('div');
                    div.className = 'wish-item';
                    div.style.display = 'flex'; // Force hiển thị
                    div.style.opacity = '1';
                    div.style.visibility = 'visible';
                    div.innerHTML = `<span class="wish-icon">${w.icon}</span><span class="wish-text">${w.text}</span>`;
                    container.appendChild(div);
                    
                    // Animation
                    gsap.from(div, { 
                        opacity: 0, 
                        x: -20, 
                        duration: 0.2, 
                        delay: i * 0.1 
                    });
                }
                
                // Thông báo số lượng
                console.log('Đã hiển thị', wishes.length, 'lời chúc');
                console.log('Số phần tử trong container:', container.children.length);
            }

            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });

            function closeModal() {
                gsap.to(modalContent, { scale: 0.8, y: 30, opacity: 0, duration: 0.2 });
                gsap.to(modal, { opacity: 0, duration: 0.2, onComplete: () => {
                    modal.style.display = 'none';
                    const container = document.getElementById('wishesContainer');
                    if (container) container.innerHTML = '';
                    document.querySelector('.typed-container').innerHTML = '';
                }});
            }

            // Music toggle
            musicToggle.addEventListener('click', () => {
                if (!isMusicPlaying) {
                    bgMusic.play().then(() => {
                        isMusicPlaying = true;
                        updateMusicButton();
                    }).catch(() => alert('Nhấn mở thiệp trước để bật nhạc nha!'));
                } else {
                    bgMusic.pause();
                    isMusicPlaying = false;
                    updateMusicButton();
                }
            });

            function updateMusicButton() {
                musicToggle.textContent = isMusicPlaying ? '🎵' : '🔇';
                musicToggle.style.background = isMusicPlaying ? '#ffb3c6' : 'white';
            }

            // Volume
            volumeButton.addEventListener('click', () => {
                isVolumeVisible = !isVolumeVisible;
                volumeContainer.classList.toggle('show', isVolumeVisible);
            });

            volumeSlider.addEventListener('input', (e) => {
                const vol = e.target.value / 100;
                bgMusic.volume = vol;
                openSound.volume = vol;
                modalSound.volume = vol;
                volumeButton.textContent = vol === 0 ? '🔇' : vol < 0.33 ? '🔈' : vol < 0.66 ? '🔉' : '🔊';
            });

            document.addEventListener('click', (e) => {
                if (isVolumeVisible && !volumeContainer.contains(e.target) && e.target !== volumeButton) {
                    isVolumeVisible = false;
                    volumeContainer.classList.remove('show');
                }
            });

            // Theme
            themeToggle.addEventListener('click', () => {
                isDarkTheme = !isDarkTheme;
                if (isDarkTheme) {
                    document.body.style.background = 'linear-gradient(145deg, #34222e, #4f2b3e, #7b3f5c)';
                    themeToggle.textContent = '☀️';
                } else {
                    document.body.style.background = 'linear-gradient(145deg, #fbc7d1, #ffb3c6, #ff9eb5)';
                    themeToggle.textContent = '🌙';
                }
            });

            function playSound(audioEl) {
                audioEl.currentTime = 0;
                audioEl.play().catch(() => {});
            }

            // Effects vui
            function startEffects() {
                setInterval(() => {
                    const conf = document.createElement('div');
                    conf.className = 'confetti';
                    conf.style.left = Math.random() * 100 + '%';
                    conf.style.background = `hsl(${Math.random() * 30 + 330}, 80%, 70%)`;
                    conf.style.width = (6 + Math.random()*8) + 'px';
                    conf.style.height = (6 + Math.random()*8) + 'px';
                    document.body.appendChild(conf);
                    setTimeout(() => conf.remove(), 4000);
                }, 200);

                setInterval(() => {
                    const em = document.createElement('div');
                    em.className = 'floating-emoji';
                    em.innerHTML = ['🌸','🌼','🎀','💖','✨','👧','💕','🌷'][Math.floor(Math.random()*8)];
                    em.style.left = Math.random() * 100 + '%';
                    em.style.animationDuration = 4 + Math.random()*3 + 's';
                    document.body.appendChild(em);
                    setTimeout(() => em.remove(), 7000);
                }, 400);
            }

            // Esc close
            document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });

            console.log('🎀 Thiệp 8/3 với 5 lời chúc và khung ảnh đã sẵn sàng!');
        })();
    </script>
</body>
</html>
